<!DOCTYPE html>
<html>
<head>
  <title>Solix Project Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { margin:0; font-family:Arial; background:#f1f5f9; }
    .container { display:flex; height:100vh; }

    .sidebar {
      width:250px; background:#1e293b; color:white; padding:15px;
    }

    .sidebar img {
      width:140px; background:white; padding:5px;
      border-radius:6px; margin-bottom:20px;
    }

    .project {
      padding:10px; cursor:pointer; border-radius:6px;
      transition:0.2s;
    }

    .project:hover { background:#334155; transform:translateX(5px); }

    .main { flex:1; padding:20px; animation:fadeIn 0.5s; }

    @keyframes fadeIn {
      from {opacity:0; transform:translateY(10px);}
      to {opacity:1;}
    }

    .header {
      display:flex; justify-content:space-between; align-items:center;
    }

    .cards { display:flex; gap:15px; margin-top:20px; }

    .card {
      background:white; padding:15px; border-radius:10px;
      width:180px; text-align:center;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
    }

    table {
      width:100%; margin-top:20px; border-collapse:collapse;
      background:white; border-radius:10px; overflow:hidden;
    }

    th, td {
      padding:12px; border:1px solid #ddd; text-align:center;
    }

    th { background:#e2e8f0; }
    tr:hover { background:#f9fafb; }

    .chart-container {
      width:500px; margin:20px auto;
    }

    .green { color:green; font-weight:bold; }
    .yellow { color:orange; font-weight:bold; }
    .red { color:red; font-weight:bold; }
  </style>
</head>

<body>

<div class="container">

  <div class="sidebar">
    <img src="https://images.seeklogo.com/logo-png/22/2/solix-technologies-logo-png_seeklogo-228117.png">

    <div class="project" onclick="loadSummary()">🏠 Dashboard</div>
    <div class="project" onclick="loadProject('CDP')">CDP</div>
    <div class="project" onclick="loadProject('EAI')">EAI</div>
    <div class="project" onclick="loadProject('EAI-Pharma')">EAI Pharma</div>
    <div class="project" onclick="loadProject('EAI-Healthcare')">EAI Health Care</div>
    <div class="project" onclick="loadProject('EDG')">EDG</div>
    <div class="project" onclick="loadProject('ECS')">ECS</div>
  </div>

  <div class="main">

    <div class="header">
      <h1 id="title">All Projects Overview</h1>
      <img src="https://images.seeklogo.com/logo-png/22/2/solix-technologies-logo-png_seeklogo-228117.png" height="40">
    </div>

    <div class="cards" id="kpis"></div>

    <div class="chart-container">
      <canvas id="chart"></canvas>
    </div>

    <table>
      <thead id="thead"></thead>
      <tbody id="data"></tbody>
    </table>

  </div>

</div>

<script>

const SHEET_ID = "12G9-5wm4XdCbfKmXFnn0nAPyqJFOE8QL-ka0IBa0TyQ";
const API_KEY = "AIzaSyCMXFtMIf9Tlv2z_P_5I1agiwGUFn3nv7s";

const PROJECTS = [
  "CDP","EAI","EAI-Pharma","EAI-Healthcare","EDG","ECS"
];

let chart;

// FETCH
async function fetchSheet(tabName){
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(tabName)}?key=${API_KEY}`;
  const res = await fetch(url);
  const json = await res.json();

  if (!json.values || json.values.length < 2) return [];

  const headers = json.values[0];

  return json.values.slice(1).map(row => {
    let obj = {};
    headers.forEach((h,i)=>{
      obj[h.trim()] = row[i] ? row[i].trim() : "";
    });
    return obj;
  });
}

// HELPERS
const num = v => Number(v) || 0;
const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0;

function healthBadge(h){
  if(h==="Green") return '<span class="green">🟢 Green</span>';
  if(h==="Yellow") return '<span class="yellow">🟡 Yellow</span>';
  if(h==="Red") return '<span class="red">🔴 Red</span>';
  return "N/A";
}

// ================= DASHBOARD =================
async function loadSummary(){

  document.getElementById("title").innerText="All Projects Overview";

  let summary=[];

  for(let p of PROJECTS){

    let data = await fetchSheet(p);

    let dev = avg(data.map(d=>num(d["Dev %"])));
    let qa = avg(data.map(d=>num(d["QA %"])));

    let riskItems = data.map(d=>d.Risks).filter(r=>r && r!=="None");
    let risks = riskItems.length;

    // HEALTH
    let healthValues = data.map(d=>d["Health"]).filter(h=>h);
    let health="Green";
    if (healthValues.includes("Red")) health="Red";
    else if (healthValues.includes("Yellow")) health="Yellow";

    summary.push({
      Project:p.replace("-"," "),
      Dev:dev,
      QA:qa,
      Risks:risks,
      RiskDetails:riskItems.join(", "),
      Health:health
    });
  }

  renderSummary(summary);
}

// ================= RENDER =================
function renderSummary(data){

  document.getElementById("thead").innerHTML=`
    <tr>
      <th>Project</th>
      <th>Dev Avg %</th>
      <th>QA Avg %</th>
      <th>Risks</th>
      <th>Health</th>
    </tr>`;

  const dev=avg(data.map(d=>d.Dev));
  const qa=avg(data.map(d=>d.QA));
  const risks=data.reduce((a,b)=>a+b.Risks,0);

  document.getElementById("kpis").innerHTML=`
    <div class="card">Dev Avg<br><b>${dev.toFixed(1)}%</b></div>
    <div class="card">QA Avg<br><b>${qa.toFixed(1)}%</b></div>
    <div class="card">Total Risks<br><b>${risks}</b></div>
  `;

  let rows="";
  data.forEach(d=>{
    rows+=`
      <tr>
        <td>${d.Project}</td>
        <td>${d.Dev.toFixed(1)}%</td>
        <td>${d.QA.toFixed(1)}%</td>
        <td>
          ${
            d.Risks === 0
            ? '<span style="color:green;font-weight:bold">No Risk</span>'
            : `<span style="color:red;font-weight:bold" title="${d.RiskDetails}">
                ${d.Risks} ⚠️
              </span>`
          }
        </td>
        <td>${healthBadge(d.Health)}</td>
      </tr>`;
  });

  document.getElementById("data").innerHTML=rows;

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("chart"),{
    type:"bar",
    data:{
      labels:data.map(d=>d.Project),
      datasets:[
        {label:"Dev %", data:data.map(d=>d.Dev)},
        {label:"QA %", data:data.map(d=>d.QA)}
      ]
    }
  });
}

// ================= PROJECT =================
async function loadProject(project){

  document.getElementById("title").innerText=project.replace("-"," ")+" Details";

  let data=await fetchSheet(project);

  let dev = avg(data.map(d=>num(d["Dev %"])));
  let qa = avg(data.map(d=>num(d["QA %"])));
  let risks = data.filter(d=>d.Risks && d.Risks!=="None").length;

  document.getElementById("kpis").innerHTML=`
    <div class="card">Dev Avg<br><b>${dev.toFixed(1)}%</b></div>
    <div class="card">QA Avg<br><b>${qa.toFixed(1)}%</b></div>
    <div class="card">Risks<br><b>${risks}</b></div>
  `;

  document.getElementById("thead").innerHTML=`
    <tr>
      <th>Month</th>
      <th>Feature</th>
      <th>Dev %</th>
      <th>QA %</th>
      <th>Status</th>
      <th>Risks</th>
      <th>Health</th>
    </tr>`;

  let rows="";
  data.forEach(d=>{
    rows+=`
      <tr>
        <td>${d.Month}</td>
        <td>${d.Feature}</td>
        <td>${num(d["Dev %"])}%</td>
        <td>${num(d["QA %"])}%</td>
        <td>${d.Status}</td>
        <td>
          ${
            !d.Risks || d.Risks==="None"
            ? '<span style="color:green;font-weight:bold">No Risk</span>'
            : `<span style="color:red;font-weight:bold" title="${d.Risks}">
                ⚠️
              </span>`
          }
        </td>
        <td>${healthBadge(d.Health)}</td>
      </tr>`;
  });

  document.getElementById("data").innerHTML=rows;

  // TREND
  let months = data.map(d=>d.Month);
  let devData = data.map(d=>num(d["Dev %"]));
  let qaData = data.map(d=>num(d["QA %"]));

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:months,
      datasets:[
        {label:"Dev %", data:devData},
        {label:"QA %", data:qaData}
      ]
    }
  });
}

// INIT
document.addEventListener("DOMContentLoaded", loadSummary);

// AUTO REFRESH
setInterval(()=>{
  if(!document.hidden) loadSummary();
},3600000);

</script>

</body>
</html>
